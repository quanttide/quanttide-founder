# 量潮创始人仓库 — 数字资产契约
# 模块定位：创始人记忆建模体系（子模块管理 + Skill 体系）

# ── 资产组成 ──────────────────────────────────────────

assets:
  # 根目录文档
  root_docs:
    title: 根目录文档
    type: docs
    category: root
    path: .
    description: README, AGENTS, CONTRIBUTING, CHANGELOG, ROADMAP

  # Skill 体系
  skills:
    title: DevOps Skill 体系
    type: config
    category: skills
    path: .agents/skills
    description: >
      Agent 技能封装：
      - devops-commit（规范提交）
      - devops-release（发布 Release）
      - devops-submodule（子模块管理）

  # Agent 配置
  agents_config:
    title: Agent 配置
    type: config
    category: agents
    path: .agents
    description: .agents/README.md, SKILL.md 文件

  # 归档子模块
  archive:
    title: 归档子模块
    type: submodule
    category: archive
    path: docs/archive
    description: 历史记忆归档（日志、报告、代码等）

  # 上下文子模块
  context:
    title: 上下文子模块
    type: submodule
    category: context
    path: docs/context
    description: 资产定价、Git 仓库规范等上下文文档

  # 小说创作子模块
  fiction:
    title: 小说创作子模块
    type: submodule
    category: fiction
    path: docs/fiction
    description: 小说创作文档和素材

  # 日志子模块
  journal:
    title: 日志子模块
    type: submodule
    category: journal
    path: docs/journal
    description: 每日工作日志，按分类归档到 archive

  # 路线图子模块
  roadmap:
    title: 路线图子模块
    type: submodule
    category: roadmap
    path: docs/roadmap
    description: 产品路线图和战略规划

  # 愿景文档子模块
  vision:
    title: 愿景文档子模块
    type: submodule
    category: vision
    path: docs/vision
    description: 创始人愿景和战略文档

  # 脚本
  scripts:
    title: 工具脚本
    type: code
    category: scripts
    path: scripts
    description: 项目管理自动化脚本

  # 示例
  examples:
    title: 示例代码
    type: experiment
    category: examples
    path: examples
    description: 产品路线图生成、Ollama blueprint 生成等示例

# ── Skills 定义 ──────────────────────────────────────────

skills:
  # 日志归档
  archive_journal:
    title: 日志归档
    description: 将 docs/journal 中非今日日志移动到 docs/archive/journal 对应目录

  # 子模块更新
  update_submodules:
    title: 子模块更新
    description: 拉取所有子模块最新变更
    commands:
      - git submodule update --remote

  # 规范提交
  commit:
    title: 规范提交
    description: 使用 Conventional Commits 格式提交
    commands:
      - git add <files>
      - git commit -m "<type>: <description>"

  # 代码质量检查
  lint:
    title: 代码质量检查
    description: Ruff 检查
    commands:
      - ruff check scripts/ examples/
