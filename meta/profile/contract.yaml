# Data Contract: quanttide-founder profile
# 本文件定义 quanttide-founder 元仓库的数据契约
# 事实源：所有结构化数据以此为准

dataContractSpecification: 0.9.3
id: quanttide-founder-profile
info:
  title: Quanttide Founder Profile Contract
  version: 0.1.0
  description: 元仓库的子模块、Release、记忆模型的数据契约
  owner: quanttide
  contact:
    name: founder

# ============================================
# 语义层：记忆分类框架
# ============================================
semantics:
  # 陈述型记忆 - 九宫格模型
  declarative:
    dimensions:
      time: [past, present, future]
      type: [event, semantic, self]
    grid:
      past-event: archive      # 工作归档
      past-semantic: tutorial  # 工作教程
      past-self: history       # 工作历程
      present-event: journal   # 工作日志
      present-semantic: profile # 工作档案
      present-self: brochure   # 宣传册
      future-event: report     # 工作报告
      future-semantic: essay   # 工作札记
      future-self: roadmap     # 工作蓝图

  # 程序型记忆 - 五层体系
  procedural:
    levels:
      - id: L1
        name: paper
        label: 工作论文
        metaphor: 立法原理
        binding: none
      - id: L2
        name: usecase
        label: 工作案例
        metaphor: 精选判例
        binding: reference
      - id: L3
        name: handbook
        label: 工作手册
        metaphor: 权威汇编
        binding: advisory
      - id: L4
        name: specification
        label: 工程标准
        metaphor: 程序性法律
        binding: mandatory
      - id: L5
        name: bylaw
        label: 工作章程
        metaphor: 宪法
        binding: constitutional

# ============================================
# Schema 层：子模块定义
# ============================================
models:
  submodule:
    description: Git 子模块定义
    type: array
    items:
      type: object
      required: [name, path, category]
      properties:
        name:
          type: string
          description: 子模块标识符
          pattern: "^[a-z][a-z0-9-]*$"
        path:
          type: string
          description: 相对路径
        category:
          type: string
          enum: [declarative, procedural]
          description: 记忆类型
        grid:
          type: string
          description: 九宫格位置（category=declarative 时必填）
          enum: [past-event, past-semantic, past-self, present-event, present-semantic, present-self, future-event, future-semantic, future-self]
        type:
          type: string
          description: 程序型层级（category=procedural 时必填）
          enum: [platform, constitution, statute-law, customary-law, case-law, authoritative-law]
        description:
          type: string
          description: 功能描述

  release:
    description: Release 记录
    type: object
    properties:
      main:
        type: object
        properties:
          repo:
            type: string
            const: quanttide-founder
          tag:
            type: string
            pattern: "^v?[0-9]+\\.[0-9]+\\.[0-9]+$"
          date:
            type: string
            format: date
      submodules:
        type: array
        items:
          type: object
          required: [name, repo, tag, date]
          properties:
            name:
              type: string
            repo:
              type: string
              description: GitHub 仓库名
            tag:
              type: string
              pattern: "^v?[0-9]+\\.[0-9]+\\.[0-9]+$"
            date:
              type: string
              format: date

# ============================================
# 约束层：质量规则
# ============================================
quality:
  # 命名约定
  naming:
    submodule:
      repo_pattern: "quanttide-{name}-of-founder"
      path_docs: "docs/{name}"
      path_packages: "packages/{name}"
      path_src: "src/{name}"

  # 版本约定
  versioning:
    tag_format: semver
    prefix: optional  # v 前缀可选
    changelog: required

  # 文件约定
  files:
    required: [README.md, CHANGELOG.md]
    optional: [CONTRIBUTING.md, AGENTS.md, meta/]

# ============================================
# 数据层：实际数据（事实源）
# ============================================
data:
  submodules:
    - name: thera
      path: src/thera
      category: procedural
      type: platform
      description: 技术平台，CLI 工具和自动化脚本

    - name: qtadmin
      path: src/qtadmin
      category: procedural
      type: platform
      description: 管理后台，管理和运营工具

    - name: devops
