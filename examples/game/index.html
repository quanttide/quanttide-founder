<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>量潮科技模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#e3f2fd,#e0f2f1,#f3e5f5);
  min-height:100vh;display:flex;justify-content:center;align-items:center;padding:12px;
}
#app{
  width:100%;max-width:520px;background:#f8fafc;border-radius:20px;
  box-shadow:0 8px 40px rgba(0,0,0,.12);overflow:hidden;position:relative;
}
.header{
  background:linear-gradient(135deg,#1565c0,#00897b);
  color:#fff;padding:12px 16px;display:flex;flex-wrap:wrap;gap:4px 10px;font-size:12px;font-weight:600;align-items:center;
}
.header .stat{display:flex;align-items:center;gap:3px;white-space:nowrap}
.header .stat .num{min-width:20px;text-align:right;font-variant-numeric:tabular-nums}
.main-area{padding:12px;display:flex;flex-direction:column;gap:10px;min-height:400px}
.section-title{
  font-size:13px;font-weight:700;color:#546e7a;display:flex;align-items:center;gap:6px;margin-bottom:6px;
}
.section-title .badge{
  font-size:10px;background:#e3f2fd;color:#1565c0;padding:1px 8px;border-radius:10px;font-weight:600;
}
.project-board{
  background:#fff;border-radius:14px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);
  min-height:100px;
}
.project-list{display:flex;flex-direction:column;gap:6px}
.project-card{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:#f8faff;border:1px solid #e8edf5;border-radius:10px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.project-card:hover{transform:translateX(3px);border-color:#90caf9;box-shadow:0 2px 8px rgba(21,101,192,.1)}
.project-card .icon{font-size:22px;width:32px;text-align:center}
.project-card .info{flex:1;min-width:0}
.project-card .info .name{font-size:13px;font-weight:600;color:#263238}
.project-card .info .client{font-size:11px;color:#90a4ae}
.project-card .info .tags{display:flex;gap:4px;margin-top:3px}
.project-card .info .tags span{
  font-size:9px;padding:1px 6px;border-radius:6px;font-weight:600;
}
.tag-data{background:#e3f2fd;color:#1565c0}
.tag-edu{background:#e0f2f1;color:#00897b}
.project-card .reward{font-size:14px;font-weight:700;color:#ff6f00;white-space:nowrap}
.project-card .duration{font-size:10px;color:#b0bec5;text-align:right;white-space:nowrap}
.project-card .accept-btn{
  padding:5px 12px;border:none;border-radius:8px;font-size:11px;font-weight:700;
  background:linear-gradient(135deg,#42a5f5,#1e88e5);color:#fff;cursor:pointer;transition:all .2s;
}
.project-card .accept-btn:hover{transform:scale(1.05);box-shadow:0 2px 8px rgba(30,136,229,.4)}
.project-card .accept-btn:disabled{background:#cfd8dc;cursor:not-allowed;transform:none}

.active-projects{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.active-card{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:#f5f7fa;border-radius:8px;border-left:3px solid #42a5f5;
}
.active-card.data{border-left-color:#42a5f5}
.active-card.edu{border-left-color:#26a69a}
.active-card .icon{font-size:18px}
.active-card .info{flex:1;min-width:0}
.active-card .info .name{font-size:11px;font-weight:600;color:#37474f}
.active-card .info .client{font-size:10px;color:#90a4ae}
.active-card .progress{height:4px;background:#e8edf5;border-radius:2px;overflow:hidden;margin-top:4px}
.active-card .progress .fill{
  height:100%;border-radius:2px;background:linear-gradient(90deg,#42a5f5,#1e88e5);transition:width .3s;
}
.active-card .progress .fill.edu-fill{background:linear-gradient(90deg,#26a69a,#00897b)}

.team-area{
  background:#fff;border-radius:14px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.team-grid{display:flex;flex-wrap:wrap;gap:6px}
.team-member{
  display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:#f5f7fa;border-radius:8px;font-size:11px;flex:1;min-width:100px;
}
.team-member .avatar{font-size:18px}
.team-member .tinfo{flex:1;min-width:0}
.team-member .tinfo .name{font-weight:600;color:#263238;font-size:11px}
.team-member .tinfo .skills{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
.team-member .tinfo .skills span{
  font-size:8px;padding:1px 5px;border-radius:4px;font-weight:600;
}
.team-member .tinfo .skills .sdata{background:#e3f2fd;color:#1565c0}
.team-member .tinfo .skills .sedu{background:#e0f2f1;color:#00897b}
.idle-badge{font-size:8px;color:#66bb6a;font-weight:600}

.loop-indicator{
  background:linear-gradient(135deg,#e8eaf6,#f3e5f5);border-radius:12px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;
}
.loop-indicator .loop-icon{font-size:24px}
.loop-indicator .loop-info{flex:1}
.loop-indicator .loop-info .title{font-size:12px;font-weight:700;color:#5c6bc0}
.loop-indicator .loop-info .desc{font-size:10px;color:#78909c;line-height:1.4}
.loop-indicator .loop-level{
  font-size:20px;font-weight:800;color:#5c6bc0;text-align:center;
}
.loop-indicator .loop-level .label{display:block;font-size:9px;font-weight:400;color:#90a4ae}

.bottom-panel{
  border-top:1px solid #eceff1;background:#fff;
}
.bottom-panel .panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;cursor:pointer;font-size:13px;font-weight:700;color:#546e7a;
}
.bottom-panel .panel-body{padding:0 16px 14px;display:none;flex-direction:column;gap:6px}
.bottom-panel.open .panel-body{display:flex}
.upgrade-card{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:#f8faff;border:1px solid #e8edf5;border-radius:10px;
}
.upgrade-card .icon{font-size:20px;width:28px;text-align:center}
.upgrade-card .info{flex:1}
.upgrade-card .info .name{font-size:12px;font-weight:600;color:#37474f}
.upgrade-card .info .desc{font-size:10px;color:#90a4ae}
.upgrade-card .info .level{font-size:10px;color:#5c6bc0;font-weight:600}
.upgrade-card .buy-btn{
  padding:4px 12px;border:none;border-radius:6px;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.upgrade-card .buy-btn:not(:disabled){
  background:linear-gradient(135deg,#ffd54f,#ffb300);color:#4e342e;
}
.upgrade-card .buy-btn:not(:disabled):hover{transform:scale(1.05)}
.upgrade-card .buy-btn:disabled{background:#eceff1;color:#b0bec5;cursor:not-allowed}

.toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);
  background:rgba(0,0,0,.8);color:#fff;padding:14px 24px;border-radius:14px;
  font-size:14px;font-weight:600;z-index:100;opacity:0;pointer-events:none;
  transition:all .3s ease;text-align:center;max-width:80%;
}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.modal-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(3px);
  animation:fadeIn .3s;
}
.modal{
  background:#fff;border-radius:20px;padding:24px 28px;width:90%;max-width:360px;
  text-align:center;animation:modalPop .3s ease;
}
.modal h2{font-size:20px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.modal p{font-size:13px;color:#546e7a;margin:4px 0;line-height:1.6}
.modal .stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0}
.modal .stat-row .s{text-align:center}
.modal .stat-row .s .v{font-size:22px;font-weight:800;color:#1565c0}
.modal .stat-row .s .l{font-size:10px;color:#90a4ae}
.modal button{
  margin-top:10px;padding:10px 28px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#42a5f5,#1565c0);color:#fff;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;
}
.modal button:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(21,101,192,.3)}
.modal .choice-btn{
  display:block;width:100%;margin-top:8px;padding:10px;border:1px solid #e0e0e0;
  border-radius:10px;background:#fafafa;color:#37474f;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;text-align:left;
}
.modal .choice-btn:hover{background:#e3f2fd;border-color:#90caf9;transform:none;box-shadow:none}
.modal .choice-btn .effect{display:block;font-size:10px;color:#90a4ae;margin-top:2px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}

.splash{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:60;
  background:linear-gradient(135deg,#1565c0,#00897b);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
  padding:32px;
}
.splash .logo{font-size:56px;margin-bottom:8px}
.splash h1{font-size:22px;font-weight:700;margin-bottom:2px;letter-spacing:1px}
.splash .sub{font-size:13px;opacity:.85;margin:4px 0 6px;text-align:center;line-height:1.6}
.splash .quote{
  font-size:11px;opacity:.6;font-style:italic;margin:8px 0 16px;text-align:center;max-width:280px;line-height:1.5;
}
.splash button{
  padding:12px 40px;border:2px solid #fff;border-radius:12px;
  background:transparent;color:#fff;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .3s;
}
.splash button:hover{background:#fff;color:#1565c0}

.float-text{
  position:fixed;pointer-events:none;font-weight:700;font-size:18px;
  color:#4caf50;z-index:200;animation:floatUp 1s ease forwards;
}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
.float-text.loss{color:#f44336}

.intern-badge{
  display:inline-flex;align-items:center;gap:2px;font-size:9px;
  background:#e8f5e9;color:#388e3c;padding:1px 6px;border-radius:6px;font-weight:600;
}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="headerBar">
    <div class="stat">🏢 量潮科技</div>
    <div class="stat">💰 <span class="num" id="hMoney">50,000</span></div>
    <div class="stat">⭐ <span class="num" id="hRep">30</span></div>
    <div class="stat">👥 <span class="num" id="hTeam">3</span></div>
    <div class="stat">📊 <span class="num" id="hEff">1.0</span>x</div>
    <div class="stat">📅 Q<span class="num" id="hQuarter">1</span></div>
  </div>

  <div class="main-area">
    <div class="project-board">
      <div class="section-title">
        📋 项目机会
        <span class="badge" id="projectBadge">可接:2</span>
      </div>
      <div class="project-list" id="projectList"></div>
      <div class="section-title" style="margin-top:8px">
        🔄 执行中
        <span class="badge" id="activeBadge">0</span>
      </div>
      <div class="active-projects" id="activeProjects"></div>
    </div>

    <div class="team-area">
      <div class="section-title">
        👥 团队
        <span class="badge" id="teamBadge">3人</span>
        <span style="margin-left:auto;font-size:10px;color:#90a4ae;font-weight:400" id="internCount">实习生:0</span>
      </div>
      <div class="team-grid" id="teamGrid"></div>
    </div>

    <div class="loop-indicator" id="loopIndicator">
      <div class="loop-icon">🔄</div>
      <div class="loop-info">
        <div class="title">产教融合循环</div>
        <div class="desc" id="loopDesc">积累数据与教育项目激活循环</div>
      </div>
      <div class="loop-level">
        <span id="loopLevel">Lv.0</span>
        <span class="label">融合度</span>
      </div>
    </div>
  </div>

  <div class="bottom-panel" id="bottomPanel">
    <div class="panel-header" id="panelToggle">
      <span>🏗️ 战略投资</span>
      <span id="panelArrow">▲</span>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="splash" id="splash">
    <div class="logo">🏢</div>
    <h1>量潮科技模拟器</h1>
    <p class="sub">以CEO视角经营一家产教融合的科技公司<br>管理项目、建设团队、构建制度、完成蜕变</p>
    <p class="quote">"经营的本质是打磨效率→形成正向循环→规模化放大"</p>
    <button id="startBtn">开始创业</button>
  </div>
</div>
<script>
const PROJECT_TYPES={
  data:{
    label:'数据',icon:'📊',tagClass:'tag-data',tag:'数据服务',
    clients:['清华大学','北京大学','浙江大学','上海交大','华为','字节跳动','宁德时代','药明康德','中科院','MIT','Stanford'],
    baseReward:[6000,15000],baseDuration:[8,18],knowledgeType:'data',
  },
  edu:{
    label:'教育',icon:'📚',tagClass:'tag-edu',tag:'教育服务',
    clients:['浙江理工大学','杭电','浙大城市学院','深圳大学','西交利物浦','南京邮电','重庆大学','华南理工'],
    baseReward:[4000,10000],baseDuration:[6,14],knowledgeType:'edu',
  },
};

const EVENT_POOL=[
  {title:'客户变更需求',desc:'项目执行过半，客户提出需求变更',choices:[
    {label:'接受变更，保证口碑',effect:'信誉+5，工期+30%',rep:5,penalty:'duration'},
    {label:'按合同拒绝',effect:'信誉-3，工期不变',rep:-3,penalty:null},
  ]},
  {title:'团队成员离职',desc:'核心成员收到更好的offer',choices:[
    {label:'加薪留人',effect:'支出¥8000，保留团队',money:-8000,keepTeam:true},
    {label:'祝福并重新招聘',effect:'团队-1，下季度补人',team:-1,refill:true},
  ]},
  {title:'校企合作机会',desc:'有高校希望开展深度课程合作',choices:[
    {label:'投入资源深度合作',effect:'教育知识+15，信誉+5',eduKnow:15,rep:5},
    {label:'先做小项目试水',effect:'教育知识+5',eduKnow:5},
  ]},
  {title:'技术分享邀约',desc:'业界大会邀请分享技术案例',choices:[
    {label:'精心准备分享',effect:'信誉+8，数据知识+5',rep:8,dataKnow:5},
    {label:'派实习生参加',effect:'信誉+3',rep:3},
  ]},
  {title:'现金流紧张',desc:'几个项目回款延迟，现金流承压',choices:[
    {label:'催收账款',effect:'获得¥12000，信誉-2',money:12000,rep:-2},
    {label:'申请短期贷款',effect:'获得¥20000，下季度还款¥24000',money:20000,debtNextQ:24000},
  ]},
  {title:'客户推荐新客户',desc:'老客户介绍了新客户，需求匹配度高',choices:[
    {label:'优先接洽',effect:'获得一个优质项目',qualityProject:true},
    {label:'表示感谢并保持联系',effect:'信誉+2',rep:2},
  ]},
  {title:'AI工具升级',desc:'新的AI开发工具大幅提升效率',choices:[
    {label:'立即采购部署',effect:'支出¥6000，效率+0.15',money:-6000,eff:0.15},
    {label:'团队成员自学',effect:'效率+0.05，但需要时间',eff:0.05},
  ]},
  {title:'实习生计划',desc:'合作高校推荐了一批优秀学生',choices:[
    {label:'全部接纳培养',effect:'支出¥3000，获得2名实习生',money:-3000,interns:2},
    {label:'择优录取1名',effect:'获得1名实习生',interns:1},
  ]},
];

const UPGRADES=[
  {id:'tools',name:'数据工具链',icon:'🛠️',desc:'数据项目效率+20%/级',baseCost:12000,mul:1.8,maxLv:5,effData:0.2},
  {id:'curriculum',name:'课程体系',icon:'📖',desc:'教育项目效率+20%/级',baseCost:10000,mul:1.8,maxLv:5,effEdu:0.2},
  {id:'platform',name:'内部平台',icon:'🏗️',desc:'全局效率+10%/级',baseCost:15000,mul:2.0,maxLv:4,effAll:0.1},
  {id:'brand',name:'品牌建设',icon:'📢',desc:'项目单价+15%/级',baseCost:8000,mul:1.7,maxLv:5,priceUp:0.15},
  {id:'automation',name:'流程自动化',icon:'🤖',desc:'同时承接项目+1/级',baseCost:20000,mul:2.2,maxLv:3,slotUp:1},
];

const NAMES=['陈小明','林芳','王建国','张丽华','李志远','赵敏','刘洋','周婷','吴强','郑茜','孙浩然','朱雨'];

class Game{
  constructor(){
    this.state={
      money:50000,reputation:30,quarter:1,eff:1.0,
      team:[],activeProjects:[],availableProjects:[],
      knowledge:{data:0,edu:0},
      loopLevel:0,
      interns:0,
      upgrades:{tools:0,curriculum:0,platform:0,brand:0,automation:0},
      totalServed:0,totalMissed:0,
      spawnTimer:null,eventTimer:null,gameLoop:null,
      capacity:2,paused:false,
      debtNextQ:0,
      eventCooldown:0,
    };
    this.teamIdCounter=0;
    this.startTeam();
  }

  startTeam(){
    for(let i=0;i<3;i++){
      this.state.team.push(this.createMember(i===0?0.7:i===1?0.5:0.3));
    }
  }

  createMember(dataSkill=0.3){
    const total=dataSkill+Math.random()*0.4;
    return{
      id:++this.teamIdCounter,
      name:NAMES[Math.floor(Math.random()*NAMES.length)],
      data:Math.round(Math.min(1,dataSkill+Math.random()*0.3)*100),
      edu:Math.round(Math.min(1,(1-dataSkill)+Math.random()*0.3)*100),
      busy:false,
    };
  }

  start(){
    this.state.paused=false;
    document.getElementById('splash').style.display='none';
    this.spawnProjects();
    this.eventTimer=setInterval(()=>this.tryEvent(),25000);
    this.gameLoop=setInterval(()=>this.tick(),500);
    this.updateUI();
    this.renderUpgrades();
  }

  spawnProjects(){
    if(this.state.spawnTimer)clearInterval(this.state.spawnTimer);
    this.state.spawnTimer=setInterval(()=>this.generateProject(),6000);
    for(let i=0;i<2;i++)setTimeout(()=>this.generateProject(),i*1500);
  }

  generateProject(){
    if(this.state.paused)return;
    if(this.state.availableProjects.length>=4)return;
    const types=['data','edu'];
    const typeKey=types[Math.floor(Math.random()*types.length)];
    const type=PROJECT_TYPES[typeKey];
    const client=type.clients[Math.floor(Math.random()*type.clients.length)];
    const reward=type.baseReward[0]+Math.random()*(type.baseReward[1]-type.baseReward[0]);
    const duration=type.baseDuration[0]+Math.floor(Math.random()*(type.baseDuration[1]-type.baseDuration[0]+1));
    const repWeight=this.state.reputation/100;
    const quality=0.5+repWeight*0.5+Math.random()*0.3;
    const proj={
      id:Date.now()+Math.random(),
      type:typeKey,client,reward:Math.round(reward*quality/1000)*1000,
      duration,remaining:duration*2,clientLabel:client,
      knowledgeType:type.knowledgeType,
      icon:type.icon,tag:type.tag,tagClass:type.tagClass,
      started:false,progress:0,
    };
    this.state.availableProjects.push(proj);
    this.renderProjects();
  }

  acceptProject(proj){
    if(this.state.paused)return;
    if(this.state.activeProjects.length>=this.state.capacity){
      this.toast('项目容量已满，升级「流程自动化」可扩容');
      return;
    }
    proj.started=true;
    const projClone={...proj,progress:0,remaining:proj.duration*2};
    this.state.activeProjects.push(projClone);
    this.state.availableProjects=this.state.availableProjects.filter(p=>p!==proj);
    this.renderProjects();
    this.updateUI();
  }

  tick(){
    if(this.state.paused)return;
    const completed=[];
    for(const p of this.state.activeProjects){
      const isData=p.type==='data';
      const baseSpeed=0.5+this.state.eff*0.5;
      const upgSpeed=isData?1+this.state.upgrades.tools*0.2:1+this.state.upgrades.curriculum*0.2;
      const allSpeed=1+this.state.upgrades.platform*0.1;
      const speed=baseSpeed*upgSpeed*allSpeed;
      p.remaining-=speed*0.5;
      p.progress=Math.min(1,1-p.remaining/(p.duration*2));
      if(p.remaining<=0)completed.push(p);
    }
    completed.forEach(p=>this.completeProject(p));
    this.renderActive();
  }

  completeProject(proj){
    this.state.activeProjects=this.state.activeProjects.filter(p=>p!==proj);
    const isData=proj.type==='data';
    const priceMult=1+this.state.upgrades.brand*0.15;
    const synergyMult=1+this.state.loopLevel*0.1;
    const reward=Math.round(proj.reward*priceMult*synergyMult);
    const knowledgeGain=5+Math.floor(Math.random()*6);
    this.state.money+=reward;
    this.state.knowledge[isData?'data':'edu']+=knowledgeGain;
    this.state.totalServed++;
    if(proj.client==='浙江理工大学')this.state.reputation+=4;
    else this.state.reputation=Math.min(100,this.state.reputation+2);
    this.state.reputation=Math.min(100,this.state.reputation);
    this.updateLoop();
    this.floatText(`+¥${reward.toLocaleString()}`,true);
    this.toast(`✅ ${proj.client}项目完成 +¥${reward.toLocaleString()}`);
    this.updateUI();
    this.renderProjects();
    if(this.state.interns>0&&isData&&Math.random()<0.3){
      this.state.money-=Math.round(reward*0.1);
      this.floatText(`👨‍🎓 实习生参与项目，成本-¥${Math.round(reward*0.1).toLocaleString()}`,true);
    }
    if(this.state.totalServed%3===0)this.tryEvent();
    this.renderActive();
  }

  updateLoop(){
    const d=this.state.knowledge.data;
    const e=this.state.knowledge.edu;
    const prev=this.state.loopLevel;
    this.state.loopLevel=Math.min(5,Math.floor(Math.min(d,e)/20));
    if(this.state.loopLevel>prev&&prev>0){
      this.toast(`🔄 产教融合循环升级 Lv.${this.state.loopLevel}！全局效率+${this.state.loopLevel*10}%`);
    }
  }

  hireMember(){
    const cost=8000+this.state.team.length*2000;
    if(this.state.money<cost){this.toast('💰 资金不足');return;}
    const spec=Math.random();
    const m=this.createMember(spec<0.5?0.6:0.2);
    this.state.money-=cost;
    this.state.team.push(m);
    this.toast(`👤 ${m.name} 加入团队`);
    this.updateUI();
  }

  fireMember(member){
    if(this.state.team.length<=2){this.toast('至少保留2名核心成员');return;}
    this.state.team=this.state.team.filter(m=>m!==member);
    this.state.reputation=Math.max(0,this.state.reputation-2);
    this.toast(`😢 ${member.name} 离开了团队`);
    this.updateUI();
  }

  getUpgradeCost(id){
    const u=UPGRADES.find(x=>x.id===id);
    const lv=this.state.upgrades[id];
    if(lv>=u.maxLv)return -1;
    return Math.round(u.baseCost*Math.pow(u.mul,lv));
  }

  buyUpgrade(id){
    const u=UPGRADES.find(x=>x.id===id);
    const lv=this.state.upgrades[id];
    if(lv>=u.maxLv)return;
    const cost=this.getUpgradeCost(id);
    if(this.state.money<cost){this.toast('💰 资金不足');return;}
    this.state.money-=cost;
    this.state.upgrades[id]++;
    if(id==='automation')this.state.capacity+=1;
    if(id==='platform')this.state.eff+=0.1;
    this.toast(`⬆️ ${u.name} Lv.${this.state.upgrades[id]}`);
    this.updateUI();
    this.renderUpgrades();
  }

  tryEvent(){
    if(this.state.paused)return;
    if(this.state.eventCooldown>0){this.state.eventCooldown--;return;}
    const event=EVENT_POOL[Math.floor(Math.random()*EVENT_POOL.length)];
    this.showEvent(event);
    this.state.eventCooldown=3;
  }

  showEvent(event){
    this.state.paused=true;
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    let choicesHtml=event.choices.map((c,i)=>`
      <button class="choice-btn" data-idx="${i}">
        ${c.label}
        <span class="effect">${c.effect}</span>
      </button>
    `).join('');
    overlay.innerHTML=`
      <div class="modal">
        <h2>📢 ${event.title}</h2>
        <p>${event.desc}</p>
        ${choicesHtml}
      </div>
    `;
    document.getElementById('app').appendChild(overlay);
    overlay.querySelectorAll('.choice-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const idx=parseInt(btn.dataset.idx);
        this.resolveEvent(event,idx);
        overlay.remove();
        this.state.paused=false;
      });
    });
  }

  resolveEvent(event,idx){
    const c=event.choices[idx];
    if(c.money)this.state.money+=c.money;
    if(c.rep)this.state.reputation=Math.max(0,Math.min(100,this.state.reputation+c.rep));
    if(c.team)this.state.team.splice(0,Math.abs(c.team));
    if(c.eff)this.state.eff+=c.eff;
    if(c.dataKnow)this.state.knowledge.data+=c.dataKnow;
    if(c.eduKnow)this.state.knowledge.edu+=c.eduKnow;
    if(c.interns)this.state.interns+=c.interns;
    if(c.debtNextQ)this.state.debtNextQ+=c.debtNextQ;
    if(c.keepTeam)this.toast('💪 团队稳定下来了');
    if(c.refill)setTimeout(()=>this.hireMember(),5000);
    if(c.qualityProject){
      const typeKey=Math.random()<0.5?'data':'edu';
      const type=PROJECT_TYPES[typeKey];
      const proj={
        id:Date.now()+Math.random(),
        type:typeKey,client:'口碑推荐客户',reward:20000,
        duration:10,remaining:20,clientLabel:'口碑推荐',
        knowledgeType:type.knowledgeType,
        icon:type.icon,tag:type.tag,tagClass:type.tagClass,
        started:false,progress:0,
      };
      this.state.availableProjects=[proj,...this.state.availableProjects];
      this.renderProjects();
    }
    this.toast(`📢 ${c.label}`);
    this.updateUI();
  }

  toast(msg,time=2000){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='toast show';
    clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',time);
  }

  floatText(msg,positive=true){
    const el=document.createElement('div');
    el.className='float-text'+(positive?'':' loss');
    el.textContent=msg;
    el.style.left=(Math.random()*200+80)+'px';el.style.top='160px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }

  renderProjects(){
    const list=document.getElementById('projectList');
    list.innerHTML='';
    this.state.availableProjects.forEach(p=>{
      const div=document.createElement('div');
      div.className='project-card';
      div.innerHTML=`
        <div class="icon">${p.icon}</div>
        <div class="info">
          <div class="name">${p.client} · ${p.tag}</div>
          <div class="tags"><span class="${p.tagClass}">${p.tag}</span></div>
        </div>
        <div class="reward">¥${p.reward.toLocaleString()}</div>
        <div class="duration">${p.duration}周</div>
        <button class="accept-btn">接</button>
      `;
      div.querySelector('.accept-btn').addEventListener('click',(e)=>{
        e.stopPropagation();this.acceptProject(p);
      });
      list.appendChild(div);
    });
  }

  renderActive(){
    const container=document.getElementById('activeProjects');
    container.innerHTML='';
    if(this.state.activeProjects.length===0){
      container.innerHTML='<div style="font-size:11px;color:#b0bec5;text-align:center;padding:8px">暂无执行中的项目</div>';
      return;
    }
    this.state.activeProjects.forEach(p=>{
      const div=document.createElement('div');
      div.className='active-card '+(p.type==='data'?'data':'edu');
      div.innerHTML=`
        <div class="icon">${p.icon}</div>
        <div class="info">
          <div class="name">${p.client}</div>
          <div class="progress"><div class="fill ${p.type==='edu'?'edu-fill':''}" style="width:${p.progress*100}%"></div></div>
        </div>
        <div style="font-size:10px;color:#78909c;font-weight:600">${Math.round(p.progress*100)}%</div>
      `;
      container.appendChild(div);
    });
    document.getElementById('activeBadge').textContent=this.state.activeProjects.length;
  }

  renderTeam(){
    const grid=document.getElementById('teamGrid');
    grid.innerHTML='';
    this.state.team.forEach(m=>{
      const div=document.createElement('div');
      div.className='team-member';
      div.innerHTML=`
        <div class="avatar">${m.data>m.edu?'👩‍💻':'👨‍🏫'}</div>
        <div class="tinfo">
          <div class="name">${m.name}</div>
          <div class="skills">
            <span class="sdata">📊 ${m.data}</span>
            <span class="sedu">📚 ${m.edu}</span>
          </div>
        </div>
      `;
      grid.appendChild(div);
    });
  }

  renderUpgrades(){
    const body=document.getElementById('panelBody');
    body.innerHTML='';
    UPGRADES.forEach(u=>{
      const lv=this.state.upgrades[u.id];
      const maxed=lv>=u.maxLv;
      const cost=maxed?-1:this.getUpgradeCost(u.id);
      const canBuy=!maxed&&this.state.money>=cost;
      const div=document.createElement('div');
      div.className='upgrade-card';
      div.innerHTML=`
        <div class="icon">${u.icon}</div>
        <div class="info">
          <div class="name">${u.name}</div>
          <div class="desc">${u.desc}</div>
          <div class="level">Lv.${lv}/${u.maxLv}</div>
        </div>
        <button class="buy-btn" ${maxed||!canBuy?'disabled':''}>${maxed?'已满级':`¥${cost.toLocaleString()}`}</button>
      `;
      div.querySelector('.buy-btn').addEventListener('click',()=>this.buyUpgrade(u.id));
      body.appendChild(div);
    });
  }

  endQuarter(){
    this.state.paused=true;
    if(this.state.spawnTimer){clearInterval(this.state.spawnTimer);this.state.spawnTimer=null;}
    if(this.state.eventTimer){clearInterval(this.state.eventTimer);this.state.eventTimer=null;}
    const totalMoney=this.state.money;
    const rep=this.state.reputation;
    const knowSum=this.state.knowledge.data+this.state.knowledge.edu;
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    let grade='C';
    if(knowSum>=100&&rep>=70&&totalMoney>=150000)grade='S';
    else if(knowSum>=70&&rep>=55&&totalMoney>=100000)grade='A';
    else if(knowSum>=40&&rep>=40&&totalMoney>=60000)grade='B';
    const gradeEmoji={S:'🏆',A:'🌟',B:'👍',C:'💪'};
    overlay.innerHTML=`
      <div class="modal">
        <h2>${gradeEmoji[grade]} 第${this.state.quarter}季度</h2>
        <div class="stat-row">
          <div class="s"><div class="v">¥${totalMoney.toLocaleString()}</div><div class="l">现金</div></div>
          <div class="s"><div class="v">${rep}</div><div class="l">信誉</div></div>
          <div class="s"><div class="v">${knowSum}</div><div class="l">知识总量</div></div>
        </div>
        <p>完成项目 <strong>${this.state.totalServed}</strong> 个 · 团队 <strong>${this.state.team.length}</strong> 人</p>
        <p style="font-size:12px;color:#78909c">产教融合 Lv.${this.state.loopLevel} · 效率 ${(this.state.eff*100).toFixed(0)}%</p>
        <button class="nextQ">进入下一季度</button>
      </div>
    `;
    document.getElementById('app').appendChild(overlay);
    overlay.querySelector('.nextQ').addEventListener('click',()=>{
      overlay.remove();
      this.state.quarter++;
      if(this.state.debtNextQ>0){
        this.state.money-=this.state.debtNextQ;
        this.toast(`💰 偿还贷款 ¥${this.state.debtNextQ.toLocaleString()}`);
        this.state.debtNextQ=0;
      }
      this.state.paused=false;
      this.spawnProjects();
      this.eventTimer=setInterval(()=>this.tryEvent(),25000);
      this.updateUI();
    });
  }

  updateUI(){
    document.getElementById('hMoney').textContent=this.state.money.toLocaleString();
    document.getElementById('hRep').textContent=this.state.reputation;
    document.getElementById('hTeam').textContent=this.state.team.length;
    document.getElementById('hEff').textContent=this.state.eff.toFixed(1);
    document.getElementById('hQuarter').textContent=this.state.quarter;
    document.getElementById('projectBadge').textContent=`可接:${this.state.capacity-this.state.activeProjects.length}`;
    document.getElementById('activeBadge').textContent=this.state.activeProjects.length;
    document.getElementById('teamBadge').textContent=`${this.state.team.length}人`;
    document.getElementById('internCount').textContent=`实习生:${this.state.interns}`;
    const ld=document.getElementById('loopDesc');
    const ll=document.getElementById('loopLevel');
    ll.textContent=`Lv.${this.state.loopLevel}`;
    if(this.state.loopLevel===0)ld.textContent='同时积累数据与教育项目，激活产教融合循环';
    else if(this.state.loopLevel<=2)ld.textContent='产教融合初显成效，项目效率与质量提升';
    else if(this.state.loopLevel<=4)ld.textContent='正向循环运转良好，技术与教育相互赋能';
    else ld.textContent='高度融合！知识资产驱动公司持续增长';
    this.renderProjects();
    this.renderTeam();
    this.renderUpgrades();
  }
}

const game=new Game();
document.getElementById('startBtn').addEventListener('click',()=>game.start());
document.getElementById('panelToggle').addEventListener('click',()=>{
  document.getElementById('bottomPanel').classList.toggle('open');
  document.getElementById('panelArrow').textContent=
    document.getElementById('bottomPanel').classList.contains('open')?'▼':'▲';
});
setInterval(()=>game.updateUI(),1000);
</script>
</body>
</html>
